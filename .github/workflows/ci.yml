name: CI

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: go.mod

      - name: Build & Test
        run: |
          go mod download
          make build
          make test

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: make lint-install

      - name: Run golangci-lint
        run: make lint-go

  lint-sh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run ShellCheck
        run: make lint-sh

  roundtrip:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && vars.ROUNDTRIP_ENABLED == 'true')
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: go.mod

      - name: Build CLI
        run: |
          go mod download
          make build

      - name: Configure profile
        env:
          DASH0_API_URL: ${{ secrets.DASH0_API_URL }}
          DASH0_AUTH_TOKEN: ${{ secrets.DASH0_AUTH_TOKEN }}
          DASH0_OTLP_URL: ${{ secrets.DASH0_OTLP_URL }}
        run: |
          ./build/dash0 config profiles create ci \
            --api-url "$DASH0_API_URL" \
            --auth-token "$DASH0_AUTH_TOKEN" \
            --otlp-url "$DASH0_OTLP_URL"

      - name: Run roundtrip tests
        run: bash test/roundtrip/run_all.sh
