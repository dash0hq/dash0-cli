name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build & Test
        run: |
          go mod download
          make build
          make test-unit test-integration

      - name: Upload CLI binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dash0-cli
          path: build/dash0
          retention-days: 1

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: make lint-go-install

      - name: Run golangci-lint
        run: make lint-go

  lint-sh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install ShellCheck
        run: make lint-sh-install

      - name: Run ShellCheck
        run: make lint-sh

  lint-skill:
    # Fails the build if the dash0-cli Agent Skill bundle is out of sync with
    # docs/commands.md, or if the root-level publish copies under
    # .claude/skills/dash0-cli and .agents/skills/dash0-cli drifted from
    # internal/skill/content. Locally this is part of `make lint`; running it
    # as its own CI job means a PR that edits docs/commands.md without
    # regenerating the bundle fails here rather than shipping stale content.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Validate Agent Skill bundle
        run: make skill-validate

  sync-docs-to-website-dry-run:
    # Drift guard: verify on every CI build that the transformations declared in
    # `.github/workflows/sync-docs/transformations.yaml` still apply cleanly against
    # the current dash0-cli docs. The real sync (dry-run: false) runs from
    # `release.yml` after a release is published.
    name: Synchronize docs with dash0.com/docs (dry-run)
    uses: ./.github/workflows/sync-docs-to-website.yaml
    with:
      dry-run: true

  roundtrip-relevant-changes:
    # Detect whether the changes in this event could affect the roundtrip
    # matrix. Docs-only or workflow-only changes that don't touch Go sources,
    # the roundtrip scripts, the module files, or this workflow itself skip
    # the roundtrip jobs entirely. `workflow_dispatch` and pushes to `main`
    # always run the matrix.
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.roundtrip || 'true' }}
    steps:
      - name: Checkout repository
        if: github.event_name == 'pull_request'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Detect relevant changes
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            roundtrip:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'test/roundtrip/**'
              - '.github/workflows/ci.yml'

  discover-roundtrip-tests:
    runs-on: ubuntu-latest
    needs: roundtrip-relevant-changes
    if: needs.roundtrip-relevant-changes.outputs.run == 'true' && (github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'))
    outputs:
      tests: ${{ steps.find.outputs.tests }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Discover test scripts
        id: find
        run: |
          tests=$(ls test/roundtrip/test_*.sh | xargs -n1 basename -s .sh | jq -Rnc '[inputs]')
          echo "tests=$tests" >> "$GITHUB_OUTPUT"

  roundtrip:
    # Runs each roundtrip test against the Dash0 dev environment under two auth
    # modes:
    #   - token_kind: static  → DASH0_AUTH_TOKEN secret (legacy long-lived `auth_*`).
    #   - token_kind: oauth   → a profile file written to ~/.dash0 that holds an
    #                           OAuth client_id + refresh token; the CLI's
    #                           auto-refresh exchanges the refresh token for a
    #                           fresh `dash0_at_*` access token on first use.
    #
    # The OAuth matrix is the catch for issues that are only surfaced by
    # OAuth-issued tokens (e.g. the server-side scope gaps tracked in
    # docs/issues/oauth-access-token-scope-gap.md). OAuth runs are gated on the
    # DASH0_OAUTH_REFRESH_TOKEN secret being set — until it is, those jobs
    # short-circuit with a clear skip message, leaving the matrix structure in
    # place so the dimension exists the day the secret is provisioned.
    #
    # OTLP-bound tests (logs/spans send) are excluded from the OAuth matrix
    # because the CLI refuses OTLP sends on OAuth profiles upfront — see
    # `checkOAuthOnOtlp` in internal/client/client.go.
    runs-on: ubuntu-latest
    needs: [build, roundtrip-relevant-changes, discover-roundtrip-tests]
    if: needs.roundtrip-relevant-changes.outputs.run == 'true' && (github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'))
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover-roundtrip-tests.outputs.tests) }}
        token_kind: [static, oauth]
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download CLI binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dash0-cli
          path: build

      - name: Make CLI binary executable
        run: chmod +x build/dash0

      - name: Skip OTLP-only tests under OAuth
        # `logs send` / `spans send` go through the OTLP ingress, which the
        # Dash0 backend currently does not accept OAuth-issued access tokens
        # for. The CLI refuses these upfront with a clear error; running them
        # in the OAuth matrix would surface that pre-flight refusal rather
        # than testing anything new.
        if: matrix.token_kind == 'oauth' && (matrix.test == 'test_log_roundtrip' || matrix.test == 'test_span_roundtrip')
        run: |
          echo "Skipped: ${{ matrix.test }} sends telemetry via OTLP, which OAuth tokens cannot use."
          echo "skip=true" >> "$GITHUB_ENV"

      - name: Guard OAuth runs on secret availability
        # The OAuth matrix is meaningful only once a refresh-token secret is
        # provisioned. Until then, treat each OAuth-mode test as a no-op so
        # the workflow file already has the dimension wired in for the day
        # the secret lands. Skip is honored as PASS here.
        if: matrix.token_kind == 'oauth' && env.skip != 'true'
        env:
          DASH0_OAUTH_REFRESH_TOKEN: ${{ secrets.DASH0_OAUTH_REFRESH_TOKEN }}
        run: |
          if [ -z "${DASH0_OAUTH_REFRESH_TOKEN}" ]; then
            echo "Skipped: DASH0_OAUTH_REFRESH_TOKEN secret is not set. Provision it on the dash0-dev tenant and unset this skip."
            echo "skip=true" >> "$GITHUB_ENV"
          fi

      - name: Set up OAuth profile from secrets
        # Writes a profile JSON file under DASH0_CONFIG_DIR (ephemeral, run-
        # scoped) so the CLI sees an OAuth-typed active profile. The
        # api-client-go's auto-refresh issues a fresh access token using the
        # refresh token on the first API call, so the static `access_token`
        # placeholder below is intentionally a no-op past tense.
        #
        # The matrix uses dash0-dev for both static and OAuth so any
        # OAuth-only failures can be diffed against the static baseline on
        # the same Dash0 organization.
        if: matrix.token_kind == 'oauth' && env.skip != 'true'
        env:
          API_URL: ${{ secrets.DASH0_API_URL }}
          OTLP_URL: ${{ secrets.DASH0_OTLP_URL }}
          DATASET: ${{ secrets.DASH0_DATASET }}
          OAUTH_CLIENT_ID: ${{ secrets.DASH0_OAUTH_CLIENT_ID }}
          OAUTH_REFRESH_TOKEN: ${{ secrets.DASH0_OAUTH_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.dash0-oauth"
          cat > "${HOME}/.dash0-oauth/profiles.json" <<JSON
          {
            "profiles": [
              {
                "name": "ci-oauth",
                "configuration": {
                  "apiUrl": "${API_URL}",
                  "otlpUrl": "${OTLP_URL}",
                  "dataset": "${DATASET}",
                  "authToken": "",
                  "oauth": {
                    "clientId": "${OAUTH_CLIENT_ID}",
                    "refreshToken": "${OAUTH_REFRESH_TOKEN}",
                    "expiresAt": "2000-01-01T00:00:00Z"
                  }
                }
              }
            ]
          }
          JSON
          printf 'ci-oauth' > "${HOME}/.dash0-oauth/activeProfile"
          chmod 700 "${HOME}/.dash0-oauth"
          chmod 600 "${HOME}/.dash0-oauth/profiles.json"
          echo "DASH0_CONFIG_DIR=${HOME}/.dash0-oauth" >> "$GITHUB_ENV"
          # Verify the profile is wired correctly and the refresh token works.
          ./build/dash0 config show

      - name: Run ${{ matrix.test }} (static token)
        if: matrix.token_kind == 'static' && env.skip != 'true'
        env:
          DASH0_API_URL: ${{ secrets.DASH0_API_URL }}
          DASH0_AUTH_TOKEN: ${{ secrets.DASH0_AUTH_TOKEN }}
          DASH0_OTLP_URL: ${{ secrets.DASH0_OTLP_URL }}
          DASH0_DATASET: ${{ secrets.DASH0_DATASET }}
        run: bash test/roundtrip/${{ matrix.test }}.sh

      - name: Run ${{ matrix.test }} (OAuth token)
        # `continue-on-error: true` lets the OAuth matrix run informationally
        # while the backend extends OAuth scopes to parity with static
        # tokens. Flip this to `false` once
        # docs/issues/oauth-access-token-scope-gap.md is resolved server-
        # side; that will make OAuth roundtrip regressions block merges.
        if: matrix.token_kind == 'oauth' && env.skip != 'true'
        continue-on-error: true
        run: bash test/roundtrip/${{ matrix.test }}.sh
