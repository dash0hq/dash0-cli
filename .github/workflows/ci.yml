name: CI

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: go.mod

      - name: Build & Test
        run: |
          go mod download
          make build
          make test-unit test-integration

      - name: Upload CLI binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dash0-cli
          path: build/dash0
          retention-days: 1

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: make lint-go-install

      - name: Run golangci-lint
        run: make lint-go

  lint-sh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install ShellCheck
        run: make lint-sh-install

      - name: Run ShellCheck
        run: make lint-sh

  discover-roundtrip-tests:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.find.outputs.tests }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Discover test scripts
        id: find
        run: |
          tests=$(ls test/roundtrip/test_*.sh | xargs -n1 basename -s .sh | jq -Rnc '[inputs]')
          echo "tests=$tests" >> "$GITHUB_OUTPUT"

  roundtrip:
    runs-on: ubuntu-latest
    needs: [build, discover-roundtrip-tests]
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover-roundtrip-tests.outputs.tests) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download CLI binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dash0-cli
          path: build

      - name: Make CLI binary executable
        run: chmod +x build/dash0

      - name: Run ${{ matrix.test }}
        env:
          DASH0_API_URL: ${{ secrets.DASH0_API_URL }}
          DASH0_AUTH_TOKEN: ${{ secrets.DASH0_AUTH_TOKEN }}
          DASH0_OTLP_URL: ${{ secrets.DASH0_OTLP_URL }}
        run: bash test/roundtrip/${{ matrix.test }}.sh
