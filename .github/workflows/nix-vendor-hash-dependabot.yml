name: Nix vendorHash (Dependabot)

# Dependency bumps change go.mod / go.sum, which invalidates the buildGoModule
# vendorHash in nix/package.nix and turns the Nix build red on the PR. This
# workflow heals Dependabot PRs by recomputing the hash and pushing the fix
# back to the PR branch (see PR #188 for the failure mode this addresses).
#
# The sibling `nix-vendor-hash.yml` workflow handles the same fix for human
# PRs on `pull_request`. It cannot handle Dependabot PRs because GitHub
# withholds Actions secrets from `pull_request` runs triggered by Dependabot,
# so `REPOSITORY_FULL_ACCESS_GITHUB_TOKEN` resolves empty and `actions/checkout`
# fails with "Input required and not supplied: token".
#
# `pull_request_target` runs the workflow file from the base branch and does
# grant Actions secrets to Dependabot-triggered runs, so it is the supported
# way to push back to a Dependabot PR branch without also registering the PAT
# as a Dependabot secret.
#
# Security note: this checks out the PR branch and runs `nix build` on it
# while a write-scoped PAT is available. The `actor` guard confines the job
# to Dependabot's own bumps; the remaining trust surface is a compromised
# upstream dependency exfiltrating the PAT during the build.
on:
  pull_request_target:
    paths:
      - "go.mod"
      - "go.sum"
      - "nix/package.nix"

permissions:
  contents: read

jobs:
  update-vendor-hash:
    # Dependabot branches live in this repo (never on a fork), so we can push
    # to `head.ref`. The actor guard keeps the workflow from firing on any
    # other author's PRs — those are already covered by `nix-vendor-hash.yml`.
    if: >-
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.REPOSITORY_FULL_ACCESS_GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Recompute vendorHash
        run: ./nix/update-vendor-hash.sh

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- nix/package.nix; then
            echo "vendorHash already correct; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/package.nix
          git commit -m "chore(nix): update vendorHash for dependency change"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
