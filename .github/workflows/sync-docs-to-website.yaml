name: Synchronize docs to dash0.com/docs

# Copies the user-facing dash0-cli documentation into the site that powers https://www.dash0.com/docs,
# applying the transformations declared in `.github/workflows/sync-docs/transformations.yaml`, and
# opens a pull request against the target repository.
#
# Two modes:
#
#   - dry-run (workflow_dispatch default): run the action with `dry-run: 'true'`, which stops after
#     the transformation step (including the coverage check). No target checkout, no PR. No
#     target-side secrets required. Useful as a drift guard from CI on every PR.
#
#   - full sync (workflow_call from a release workflow, or workflow_dispatch with dry-run unchecked):
#     runs the sync-docs-action end-to-end and opens/updates a PR on the target repository.
#     Requires the DOCS_WEBSITE_PR_TOKEN secret plus SYNC_DOCUMENTATION_TARGET_REPOSITORY and
#     SYNC_DOCUMENTATION_TARGET_DIRECTORY. v0.4.0 removed the target-coordinate defaults so that
#     public callers do not re-publish the target repo's name and internal layout; keep them in
#     secrets rather than hardcoded in this file.

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Only verify the transformations still apply cleanly; do not open a pull request.
        type: boolean
        default: true
  workflow_call:
    inputs:
      dry-run:
        description: Only verify the transformations still apply cleanly; do not open a pull request.
        type: boolean
        default: false
    secrets:
      DOCS_WEBSITE_PR_TOKEN:
        description: Fine-grained PAT scoped to the target docs repository with contents+pull-requests write. Only required when dry-run is false.
        required: false
      SYNC_DOCUMENTATION_TARGET_REPOSITORY:
        description: owner/name of the target docs repository. Only required when dry-run is false.
        required: false
      SYNC_DOCUMENTATION_TARGET_DIRECTORY:
        description: Sub-tree inside the target repository where transformed files are written. Only required when dry-run is false.
        required: false

jobs:
  sync-docs:
    name: Synchronize dash0-cli docs with dash0.com/docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout dash0-cli
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # sync-docs-action v0.4.0 — https://github.com/dash0hq/sync-docs-action/releases/tag/v0.4.0
      # `dry-run: 'true'` runs setup and the transformation engine (including the coverage check),
      # then stops before any target-side operation, so no docs-website PAT or target coordinates
      # are needed on PR builds. `source-root` and `transformations-file` inherit their defaults
      # (`.` and `.github/workflows/sync-docs/transformations.yaml`).
      - name: sync docs to dash0.com/docs
        uses: dash0hq/sync-docs-action@3fbe55fed800da21ee24d6b6dba1a86435f61565 # v0.4.0
        with:
          dry-run: ${{ inputs.dry-run }}
          target-repository: ${{ secrets.SYNC_DOCUMENTATION_TARGET_REPOSITORY }}
          target-directory: ${{ secrets.SYNC_DOCUMENTATION_TARGET_DIRECTORY }}
          target-github-token: ${{ secrets.DOCS_WEBSITE_PR_TOKEN }}
          pr-branch: sync-dash0-cli-docs
          pr-title: 'docs: synchronize dash0-cli documentation'
          pr-body: |
            This PR synchronizes the content of the [dash0-cli](https://github.com/dash0hq/dash0-cli) documentation into the documentation on https://www.dash0.com/docs.
