name: Nix vendorHash

# Keep dependency-bump PRs green automatically: when go.mod / go.sum change, the
# buildGoModule vendorHash in nix/package.nix goes stale and the Nix build
# fails. This recomputes it and commits the fix back to the PR branch, so
# Dependabot (and human) dependency PRs fix their own vendorHash.
#
# Pushing back requires a token with write access. We reuse
# REPOSITORY_FULL_ACCESS_GITHUB_TOKEN (already used by release.yml); using a PAT
# rather than the default GITHUB_TOKEN also makes the follow-up commit
# re-trigger the Nix build workflow.
#
# Dependabot PRs are handled by the sibling `nix-vendor-hash-dependabot.yml`
# workflow, which uses `pull_request_target` so Dependabot-triggered runs can
# access the PAT (GitHub withholds Actions secrets from Dependabot-triggered
# `pull_request` runs otherwise).
on:
  pull_request:
    paths:
      - "go.mod"
      - "go.sum"
      - "nix/package.nix"
      - ".github/workflows/nix-vendor-hash.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-vendor-hash:
    # Only same-repo branches (we can't push to a fork's branch). Dependabot
    # PRs are handled by `nix-vendor-hash-dependabot.yml` — this `pull_request`
    # workflow can't fetch the PAT under Dependabot's secret restrictions.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.REPOSITORY_FULL_ACCESS_GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Recompute vendorHash
        run: ./nix/update-vendor-hash.sh

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- nix/package.nix; then
            echo "vendorHash already correct; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/package.nix
          git commit -m "chore(nix): update vendorHash for dependency change"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
