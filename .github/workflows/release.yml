name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  goreleaser:
    name: Release with GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod

      - name: Extract release notes from changelog
        run: .github/scripts/extract-release-notes.sh "${GITHUB_REF_NAME#v}" | tee release-notes.md

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --release-notes release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.REPOSITORY_FULL_ACCESS_GITHUB_TOKEN }}

  # Point the dash0-bin Nix package at the just-published release. This runs
  # after publishing because it hashes the uploaded release tarballs, which do
  # not exist until GoReleaser has finished. It commits to main, so the tagged
  # commit still references the previous release's binary hashes until main is
  # released again — dash0-bin tracks "latest released" on main.
  update-bin-package:
    name: Update dash0-bin hashes
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          token: ${{ secrets.REPOSITORY_FULL_ACCESS_GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Refresh dash0-bin hashes for the released version
        run: ./nix/update-bin-hashes.sh "${GITHUB_REF_NAME#v}"

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- nix/package-bin.nix; then
            echo "package-bin.nix already up to date; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/package-bin.nix
          git commit -m "chore(nix): update dash0-bin to ${GITHUB_REF_NAME}"
          git push origin HEAD:main
