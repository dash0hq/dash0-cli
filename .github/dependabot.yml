version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      go-deps:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      github-actions:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    groups:
      docker:
        update-types:
          - major
          - minor
          - patch

  - package-ecosystem: docker
    directory: /actions/dash0-deployment
    schedule:
      interval: weekly
    groups:
      docker:
        update-types:
          - major
          - minor
          - patch
