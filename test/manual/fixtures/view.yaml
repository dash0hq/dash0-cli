kind: Dash0View
metadata:
  name: minecraft-server
spec:
  display:
    description: ""
    name: Minecraft Server
  filter:
  - key: service.namespace
    operator: is
    value: minecraft
  groupBy:
  - otel.log.severity.range
  table:
    columns:
    - colSize: min-content
      key: otel.log.severity.range
      label: Severity
    - colSize: min-content
      key: otel.log.time
      label: Time
    - key: dash0.resource.id
      label: Resource
    - key: process.executable.path
    - key: otel.log.body
      label: Body
    sort:
    - direction: descending
      key: otel.log.time
  type: logs
  visualizations:
  - metric: logs_total
    renderers: []
    yAxisScale: linear
