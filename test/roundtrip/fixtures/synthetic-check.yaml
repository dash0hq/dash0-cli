kind: Dash0SyntheticCheck
metadata:
  name: new-synthetic-check
spec:
  display:
    name: New synthetic check
  enabled: true
  labels: {}
  notifications:
    channels: []
  plugin:
    kind: http
    spec:
      assertions:
        criticalAssertions:
        - kind: status_code
          spec:
            operator: is
            value: "200"
        - kind: timing
          spec:
            operator: lte
            type: total
            value: 5000ms
        degradedAssertions:
        - kind: timing
          spec:
            operator: lte
            type: total
            value: 2000ms
      request:
        headers: []
        method: get
        queryParameters: []
        redirects: follow
        tls:
          allowInsecure: true
        tracing:
          addTracingHeaders: true
        url: https://minecraft.sendung-mit-der-sau.de
  retries:
    kind: "off"
    spec: {}
  schedule:
    interval: 1m
    locations:
    - de-frankfurt
    strategy: all_locations
