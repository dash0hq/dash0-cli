# Use this changelog template to create an entry for release notes.

# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: new_component

# The name of the component, or a single word describing the area of concern (e.g. dashboards, config, apply)
component: skill

# A brief description of the change. Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add `dash0 skill install` and `dash0 skill show`, which distribute an Agent Skill teaching AI coding agents (Claude Code, Codex, Cursor, GitHub Copilot) this CLI's command surface without spending turns on `--help` exploration.

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: [212]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  `skill install` detects the current agent host (Claude Code, Codex, Cursor, or GitHub Copilot) and installs a
  SKILL.md plus reference docs into that host's conventional directory in the current project; `skill show [topic]`
  prints the same content to stdout for CI or ephemeral sessions. Neither command calls the Dash0 API or requires
  `--experimental`. In agent mode, a failing command now includes a hint pointing at `dash0 skill install` when the
  skill isn't installed yet; suppress it with `--no-skill-hint` or `DASH0_NO_SKILL_HINT`.

# If your change doesn't affect end users or the exported elements of any package,
# you should instead start your pull request title with "chore" or use the "Skip Changelog" label.
# Optional: The change log or logs in which this entry should be included.
# e.g. '[user]' or '[user, api]'
# Include 'user' if the change is relevant to end users.
# Default: '[user]'
change_logs: []
