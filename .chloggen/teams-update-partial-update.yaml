# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: bug_fix

# The name of the component, or a single word describing the area of concern (e.g. dashboards, config, apply)
component: teams

# A brief description of the change. Surround your text with quotes ("") if it needs to start with a backtick (`).
note: '`teams update` now preserves unspecified fields instead of clobbering them with empty values'

# Mandatory: One or more tracking issues related to the change. You can use the PR number here if no issue exists.
issues: []

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  Previously `dash0 --experimental teams update <id> --name "X"` sent an empty color gradient to the server and failed with `400 Bad Request: The team color must be specified with from and to value.` The command now fetches the current display, merges any provided flags, and PUTs the full block, so partial updates round-trip cleanly. Calling `teams update` with no flags at all now returns a clear `nothing to update` error instead of hitting the server. Also fixes the API client's `UpdateTeamDisplay` to accept the `204 No Content` success status the server returns per the OpenAPI spec.

  A follow-up on the CLI's error message stitching for 404 responses is tracked separately in #198 — the 404 handler currently prepends `"asset not found"` even when the server body carries a different message, producing self-contradictory error output.

